x-healthcheck: &default-healthcheck
  interval: 5m
  timeout: 10s
  retries: 3
  start_period: 20s

services:
  syllogi-api:
    container_name: syllogi-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    healthcheck:
      <<: *default-healthcheck
      test: curl --fail http://localhost:8000/api/health || exit 1
    restart: unless-stopped

  syllogi-postgres:
    container_name: syllogi-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=syllogi
      - POSTGRES_DB=syllogi
      - POSTGRES_PASSWORD=syllogi
    ports:
      - 5432:5432
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      <<: *default-healthcheck
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
    restart: unless-stopped

  syllogi-web:
    container_name: syllogi-web
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    ports:
      - 3000:3000
    volumes:
      - ./web:/app
    restart: unless-stopped
